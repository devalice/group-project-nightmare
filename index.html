<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Group Project Nightmare</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
<header class="top-bar">
    <h1>🎮 Group Project Nightmare</h1>
    <div class="status">
        <span id="stage-label"></span>
        <span id="slide-label"></span>
    </div>
</header>

<section id="story-screen" class="screen active story-scene">
    <div class="story-backdrop">
        <div class="dialog-box">
            <div class="speaker-name">나</div>
            <p id="story-text"></p>
            <button id="story-next-btn" class="primary-btn">다음</button>
        </div>
    </div>
</section>

<section id="memory-screen" class="screen">
    <p class="memory-text top-memory-text">
        마지막으로 확인한 발표 자료는 분명 이 상태였다. 잘 기억해두자.
    </p>
    <div class="slide-frame">
        <div class="slide" id="memory-slide"></div>
    </div>
    <div class="memory-controls">
        <div class="nav-buttons">
            <button id="memory-prev">← 이전</button>
            <button id="memory-next">다음 →</button>
        </div>

        <button id="memory-confirm" class="primary-btn">확인 완료</button>
    </div>
</section>

<section id="game-screen" class="screen">
    <div id="game-play-area">
        <div class="slide-frame">
            <div class="slide" id="game-slide"></div>
        </div>

        <div class="nav-buttons" id="game-nav-buttons">
            <button id="prev">← 이전</button>
            <button id="next">다음 →</button>
        </div>

        <div class="action-buttons" id="game-action-buttons">
            <button id="detect" class="danger-btn">이상현상 발견</button>
            <button id="safe" class="primary-btn">문제 없음</button>
        </div>
    </div>

    <div id="stageclear-dialog" class="dialog-box hidden stage-dialog-only">
        <div class="speaker-name">나</div>
        <p id="stageclear-text"></p>
        <button id="stageclear-next-btn" class="primary-btn">다음</button>
    </div>
</section>

<section id="gameover-screen" class="screen story-scene">
    <div class="story-backdrop">
        <div class="dialog-box">
            <div class="speaker-name" id="gameover-speaker">교수님</div>
            <p id="gameover-text"></p>
            <button id="gameover-next-btn" class="primary-btn">다음</button>
        </div>
    </div>
</section>

<section id="clear-screen" class="screen story-scene">
    <div class="story-backdrop">
        <div class="dialog-box">
            <div class="speaker-name" id="clear-speaker">교수님</div>
            <p id="clear-text"></p>
            <button id="clear-next-btn" class="primary-btn">다음</button>
        </div>
    </div>
</section>

<script src="app.js"></script>
</body>
</html>
